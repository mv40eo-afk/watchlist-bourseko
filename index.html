<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club Bourseko — Watchlist Mars 2026</title>
  <meta name="description" content="Watchlist Club Bourseko — Suivi des cours et points d'entrée" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #070d1a; color: #fff; font-family: 'DM Mono', monospace; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    input:focus, select:focus { border-color: rgba(99,102,241,0.5) !important; outline: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    button { font-family: 'DM Mono', monospace; }
    select option { background: #0d1424; color: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const INITIAL_STOCKS = [
      { id: 1,  ticker: "ADYEN", name: "Adyen",             region: "EU", currency: "EUR", entries: [1450, 1200, 900],  style: "Croissance",                    roce: 20.5, caGrowth: 17.9, per: 24.9 },
      { id: 2,  ticker: "AI",    name: "EssilorLuxottica",  region: "EU", currency: "EUR", entries: [215, 185, 150],    style: "Faible volatilité",             roce: 6.7,  caGrowth: 9.4,  per: 33.0 },
      { id: 3,  ticker: "RACE",  name: "Ferrari",           region: "EU", currency: "EUR", entries: [350, 280, 200],    style: "Très fort MOAT",                roce: 28.5, caGrowth: 7.0,  per: 33.7 },
      { id: 4,  ticker: "NEM",   name: "Nemetschek",        region: "EU", currency: "EUR", entries: [84, 58, 37],       style: "Croissance - Contrariant",       roce: 23.1, caGrowth: 22.6, per: 27.9 },
      { id: 5,  ticker: "AXP",   name: "American Express",  region: "US", currency: "USD", entries: [350, 290, 230],    style: "GARP",                           roce: 11.1, caGrowth: 10.2, per: 21.5 },
      { id: 6,  ticker: "BKNG",  name: "Booking.com",       region: "US", currency: "USD", entries: [4600, 3800, 2800], style: "GARP",                           roce: 71.1, caGrowth: 13.4, per: 17.8 },
      { id: 7,  ticker: "MSFT",  name: "Microsoft",         region: "US", currency: "USD", entries: [430, 360, 280],    style: "Croissance / Très fort Moat",    roce: 29.7, caGrowth: 14.9, per: 23.2 },
      { id: 8,  ticker: "MELI",  name: "MercadoLibre",      region: "US", currency: "USD", entries: [2050, 1750, 1200], style: "GARP",                           roce: 28.3, caGrowth: 39.1, per: 30.4 },
      { id: 9,  ticker: "SPGI",  name: "S&P Global",        region: "US", currency: "USD", entries: [450, 370, 300],    style: "Récurrence / Très Fort Moat",    roce: 12.0, caGrowth: 7.9,  per: 22.7 },
      { id: 10, ticker: "NVDA",  name: "Nvidia",            region: "US", currency: "USD", entries: [200, 160, 120],    style: "Croissance",                     roce: 74.7, caGrowth: 65.5, per: 19.3 },
      { id: 11, ticker: "BMI",   name: "Badger Meter",      region: "US", currency: "USD", entries: [160, 135, 97],     style: "Moat durable",                   roce: 24.1, caGrowth: 10.9, per: 29.8 },
    ];

    // No static fallback — if price is unavailable we show it clearly in the UI

    // Yahoo Finance symbols for all stocks (via allorigins CORS proxy)
    const YAHOO_SYMBOLS = {
      ADYEN: "ADYEN.AS",   // Euronext Amsterdam
      AI:    "EL.PA",      // Euronext Paris
      RACE:  "RACE",       // NYSE
      NEM:   "NEM.DE",     // XETRA Frankfurt
      AXP:   "AXP",
      BKNG:  "BKNG",
      MSFT:  "MSFT",
      MELI:  "MELI",
      SPGI:  "SPGI",
      NVDA:  "NVDA",
      BMI:   "BMI",
    };

    // Fetch a single ticker from Yahoo Finance via allorigins proxy
    async function fetchYahooPrice(ticker) {
      const sym = YAHOO_SYMBOLS[ticker] || ticker;
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;
      const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
      try {
        const res = await fetch(proxy, { signal: AbortSignal.timeout(8000) });
        const json = await res.json();
        const parsed = JSON.parse(json.contents);
        const price = parsed?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (price && !isNaN(price)) {
          console.log(`Yahoo OK ${ticker} (${sym}): ${price}`);
          return price;
        }
        return null;
      } catch (err) {
        console.warn(`Yahoo failed for ${ticker}:`, err.message);
        return null;
      }
    }

    // Fetch all tickers in parallel
    async function fetchAllPrices(tickers) {
      const results = await Promise.all(tickers.map(async t => ({
        ticker: t,
        price: await fetchYahooPrice(t),
      })));

      const prices = {};
      results.forEach(({ ticker, price }) => {
        if (price !== null) prices[ticker] = price;
      });

      console.log("All prices fetched:", prices);
      // Return whatever we got — even partial results are useful
      // Return null only if absolutely nothing came through
      return Object.keys(prices).length > 0 ? prices : null;
    }

    function getZone(price, entries) {
      const [high, mid, low] = entries;
      if (price <= low)  return { label: "Zone E1 — Meilleur prix", color: "#6ee7b7", bg: "rgba(16,185,129,0.12)" };
      if (price <= mid)  return { label: "Zone E2",                  color: "#fbbf24", bg: "rgba(251,191,36,0.12)" };
      if (price <= high) return { label: "Zone E3",                  color: "#f97316", bg: "rgba(249,115,22,0.12)" };
      return                     { label: "Au-dessus de E3",         color: "#94a3b8", bg: "rgba(148,163,184,0.08)" };
    }

    function fmt(n, currency) {
      const sym = currency === "EUR" ? "€" : "$";
      const s = n >= 1000
        ? n.toLocaleString("fr-FR", { maximumFractionDigits: 0 })
        : n.toLocaleString("fr-FR", { maximumFractionDigits: 2 });
      return s + sym;
    }

    /* ── PriceBar ─────────────────────────────────────── */
    function PriceBar({ price, entries }) {
      const [eHigh, eMid, eLow] = entries; // eHigh=E3 val, eLow=E1 val (best)
      const barMin = eLow  * 0.8;
      const barMax = eHigh * 1.2;
      const total  = barMax - barMin;
      const pos = v => Math.min(100, Math.max(0, ((v - barMin) / total) * 100));
      const pPrice = pos(price);
      const zone   = getZone(price, entries);
      const markers = [
        { value: eLow,  label: "E1", color: "#6ee7b7" },
        { value: eMid,  label: "E2", color: "#fbbf24" },
        { value: eHigh, label: "E3", color: "#f97316" },
      ];
      return (
        <div style={{ position: "relative", padding: "20px 0 10px" }}>
          <div style={{ position: "relative", height: 6, borderRadius: 3,
            background: "linear-gradient(90deg,rgba(16,185,129,.3),rgba(251,191,36,.3),rgba(249,115,22,.3))",
            overflow: "visible" }}>

            {/* Needle */}
            <div style={{ position: "absolute", left: `${pPrice}%`,
              top: -3, bottom: -3, width: 2, borderRadius: 2,
              background: zone.color, boxShadow: `0 0 8px ${zone.color}`,
              transition: "left .8s cubic-bezier(.4,0,.2,1)" }} />

            {/* Markers */}
            {markers.map(({ value, label, color }) => (
              <div key={label} style={{ position: "absolute", left: `${pos(value)}%`,
                top: -18, transform: "translateX(-50%)",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <span style={{ fontSize: 9, color, fontWeight: 700, letterSpacing: 1 }}>{label}</span>
                <div style={{ width: 2, height: 20, background: color, opacity: .6, borderRadius: 1 }} />
              </div>
            ))}

            {/* Dot */}
            <div style={{ position: "absolute", left: `${pPrice}%`,
              top: "50%", transform: "translate(-50%,-50%)",
              width: 12, height: 12, borderRadius: "50%",
              background: zone.color, border: "2px solid #0a0f1e",
              boxShadow: `0 0 10px ${zone.color}`, zIndex: 2,
              transition: "left .8s cubic-bezier(.4,0,.2,1)" }} />
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 7 }}>
            <span style={{ fontSize: 9, color: "#6ee7b7", opacity: .7 }}>← E1 Meilleur prix</span>
            <span style={{ fontSize: 9, color: "#f97316", opacity: .7 }}>E3 Prix haut →</span>
          </div>
        </div>
      );
    }

    /* ── StockCard ────────────────────────────────────── */
    function StockCard({ stock, onEdit, onDelete, livePrices }) {
      const [price, setPrice]   = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        // livePrices is passed as prop from App after global fetch
        if (livePrices === null) return; // still fetching globally
        // Price may be undefined if Yahoo failed for this specific ticker
        setPrice(livePrices[stock.ticker] ?? null);
        setLoading(false);
      }, [stock.ticker, livePrices]);

      const zone = price ? getZone(price, stock.entries) : null;
      const sym  = stock.currency === "EUR" ? "€" : "$";
      const fmtN = n => n >= 1000
        ? n.toLocaleString("fr-FR", { maximumFractionDigits: 0 })
        : n.toLocaleString("fr-FR", { maximumFractionDigits: 2 });

      // Badge entries: reversed so E1=lowest on left
      const badgeEntries = [...stock.entries].reverse(); // [low, mid, high]
      const badgeLabels  = ["E1", "E2", "E3"];
      const badgeColors  = ["#6ee7b7", "#fbbf24", "#f97316"];

      return (
        <div style={{
          position: "relative",
          background: zone ? zone.bg : "rgba(255,255,255,.03)",
          border: `1px solid ${zone ? zone.color + "33" : "rgba(255,255,255,.08)"}`,
          borderRadius: 16, padding: "20px 22px",
          transition: "all .3s ease",
          animation: "fadeIn .5s ease forwards", opacity: 0,
        }}
          onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-3px)"; e.currentTarget.style.boxShadow = `0 12px 40px ${zone ? zone.color+"22":"rgba(0,0,0,.3)"}`; }}
          onMouseLeave={e => { e.currentTarget.style.transform = "translateY(0)";    e.currentTarget.style.boxShadow = "none"; }}
        >
          {/* Header */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 18, fontWeight: 700, color: "#fff", letterSpacing: 1, fontFamily: "'Space Grotesk',sans-serif" }}>{stock.ticker}</span>
                <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 4,
                  background: stock.region === "EU" ? "rgba(59,130,246,.2)" : "rgba(239,68,68,.15)",
                  color: stock.region === "EU" ? "#93c5fd" : "#fca5a5",
                  fontWeight: 600, letterSpacing: 1 }}>{stock.region}</span>
              </div>
              <div style={{ fontSize: 11, color: "rgba(255,255,255,.4)", marginTop: 2 }}>{stock.name}</div>
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              {zone && <span style={{ fontSize: 9, padding: "3px 8px", borderRadius: 20,
                background: zone.color+"22", color: zone.color,
                fontWeight: 700, letterSpacing: .5, whiteSpace: "nowrap" }}>{zone.label}</span>}
              <button onClick={() => onEdit(stock)} style={{ background: "rgba(255,255,255,.06)", border: "none",
                color: "rgba(255,255,255,.5)", width: 26, height: 26, borderRadius: 6,
                cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>✎</button>
              <button onClick={() => onDelete(stock.id)} style={{ background: "rgba(239,68,68,.1)", border: "none",
                color: "#f87171", width: 26, height: 26, borderRadius: 6,
                cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
            </div>
          </div>

          {/* Price */}
          <div style={{ margin: "12px 0 4px" }}>
            {loading
              ? <div style={{ width: 110, height: 34, borderRadius: 6,
                  background: "linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%)",
                  backgroundSize: "200% 100%", animation: "shimmer 1.5s infinite" }} />
              : price !== null
                ? <span style={{ fontSize: 28, fontWeight: 700, color: zone?.color || "#fff",
                    fontFamily: "'Space Grotesk',sans-serif", letterSpacing: -1 }}>{fmtN(price)}{sym}</span>
                : <span style={{ fontSize: 15, color: "rgba(255,255,255,.3)", fontStyle: "italic" }}>
                    Cours indisponible — <a href={`https://finance.yahoo.com/quote/${YAHOO_SYMBOLS[stock.ticker]||stock.ticker}`}
                    target="_blank" rel="noreferrer"
                    style={{ color: "rgba(99,162,246,.7)", textDecoration: "none" }}>Yahoo Finance ↗</a>
                  </span>
            }
          </div>

          {/* Bar */}
          {!loading && price && <PriceBar price={price} entries={stock.entries} />}

          {/* Entry badges */}
          <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
            {badgeEntries.map((e, i) => {
              const origIdx = 2 - i;
              const isActive = price && (
                (origIdx === 2 && price <= stock.entries[2] * 1.05 && price > stock.entries[2] * 0.8) ||
                (origIdx === 1 && price <= stock.entries[1] && price > stock.entries[2]) ||
                (origIdx === 0 && price <= stock.entries[0] && price > stock.entries[1])
              );
              return (
                <div key={i} style={{ flex: 1, textAlign: "center", borderRadius: 8, padding: "6px 4px",
                  background: isActive ? badgeColors[i]+"20" : "rgba(255,255,255,.04)",
                  border: `1px solid ${isActive ? badgeColors[i]+"60" : "rgba(255,255,255,.07)"}`,
                  transition: "all .3s" }}>
                  <div style={{ fontSize: 9, color: badgeColors[i], fontWeight: 700, letterSpacing: 1 }}>{badgeLabels[i]}</div>
                  <div style={{ fontSize: 13, color: "#fff", fontWeight: 600, marginTop: 1 }}>{fmtN(e)}{sym}</div>
                </div>
              );
            })}
          </div>

          {/* Metrics */}
          <div style={{ display: "flex", gap: 16, marginTop: 14, paddingTop: 12, borderTop: "1px solid rgba(255,255,255,.06)" }}>
            {[["CA+", `+${stock.caGrowth}%`], ["PER", `${stock.per}x`], ["ROCE", `${stock.roce}%`]].map(([l, v]) => (
              <div key={l} style={{ textAlign: "center" }}>
                <div style={{ fontSize: 9, color: "rgba(255,255,255,.35)", letterSpacing: 1 }}>{l}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,.75)", fontWeight: 600 }}>{v}</div>
              </div>
            ))}
            <div style={{ marginLeft: "auto", textAlign: "right" }}>
              <div style={{ fontSize: 9, color: "rgba(255,255,255,.35)", letterSpacing: 1 }}>STYLE</div>
              <div style={{ fontSize: 10, color: "rgba(255,255,255,.5)", maxWidth: 120 }}>{stock.style}</div>
            </div>
          </div>
        </div>
      );
    }

    /* ── Modal ────────────────────────────────────────── */
    const inputSt = {
      width: "100%", padding: "9px 10px", borderRadius: 8,
      border: "1px solid rgba(255,255,255,.1)",
      background: "rgba(255,255,255,.05)", color: "#fff",
      fontSize: 13, fontFamily: "'DM Mono',monospace",
      outline: "none", boxSizing: "border-box",
    };

    function Modal({ stock, onSave, onClose }) {
      const [form, setForm] = useState(stock || {
        ticker: "", name: "", region: "US", currency: "USD",
        entries: [0, 0, 0], style: "", roce: 0, caGrowth: 0, per: 0,
      });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const setEntry = (i, v) => {
        const e = [...form.entries]; e[i] = parseFloat(v) || 0; set("entries", e);
      };
      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0,
          background: "rgba(0,0,0,.85)", backdropFilter: "blur(8px)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#0d1424",
            border: "1px solid rgba(255,255,255,.12)", borderRadius: 20,
            padding: 28, width: 480, maxWidth: "95vw", maxHeight: "90vh", overflowY: "auto" }}>

            <h2 style={{ margin: "0 0 20px", fontFamily: "'Space Grotesk',sans-serif", color: "#fff", fontSize: 18 }}>
              {stock ? "✎ Modifier" : "+ Ajouter"} une action
            </h2>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[["Ticker","ticker"],["Nom","name"]].map(([l,k]) => (
                <div key={k}>
                  <label style={{ fontSize: 10, color: "rgba(255,255,255,.4)", letterSpacing: 1, display: "block", marginBottom: 4 }}>{l}</label>
                  <input value={form[k]} onChange={e => set(k, e.target.value)} style={inputSt} />
                </div>
              ))}
              <div>
                <label style={{ fontSize: 10, color: "rgba(255,255,255,.4)", letterSpacing: 1, display: "block", marginBottom: 4 }}>Région</label>
                <select value={form.region} onChange={e => set("region", e.target.value)} style={inputSt}>
                  <option value="US">US</option><option value="EU">EU</option>
                </select>
              </div>
              <div>
                <label style={{ fontSize: 10, color: "rgba(255,255,255,.4)", letterSpacing: 1, display: "block", marginBottom: 4 }}>Devise</label>
                <select value={form.currency} onChange={e => set("currency", e.target.value)} style={inputSt}>
                  <option value="USD">USD ($)</option><option value="EUR">EUR (€)</option>
                </select>
              </div>
            </div>

            <div style={{ marginTop: 14 }}>
              <label style={{ fontSize: 10, color: "rgba(255,255,255,.4)", letterSpacing: 1, display: "block", marginBottom: 8 }}>PRIX D'ENTRÉES (entrez du plus haut au plus bas)</label>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                {[["E3 (Haut)","#f97316"],["E2 (Moyen)","#fbbf24"],["E1 (Bas — Meilleur)","#6ee7b7"]].map(([l,c],i) => (
                  <div key={i}>
                    <label style={{ fontSize: 9, color: c, display: "block", marginBottom: 4 }}>{l}</label>
                    <input type="number" value={form.entries[i]} onChange={e => setEntry(i, e.target.value)} style={inputSt} />
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginTop: 12 }}>
              {[["CA+ (1 an) %","caGrowth"],["PER (NTM)","per"],["ROCE %","roce"]].map(([l,k]) => (
                <div key={k}>
                  <label style={{ fontSize: 10, color: "rgba(255,255,255,.4)", letterSpacing: 1, display: "block", marginBottom: 4 }}>{l}</label>
                  <input type="number" value={form[k]} onChange={e => set(k, parseFloat(e.target.value)||0)} style={inputSt} />
                </div>
              ))}
            </div>

            <div style={{ marginTop: 12 }}>
              <label style={{ fontSize: 10, color: "rgba(255,255,255,.4)", letterSpacing: 1, display: "block", marginBottom: 4 }}>Style d'investissement</label>
              <input value={form.style} onChange={e => set("style", e.target.value)} style={inputSt} />
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 22 }}>
              <button onClick={onClose} style={{ flex: 1, padding: 12, borderRadius: 10,
                border: "1px solid rgba(255,255,255,.12)", background: "transparent",
                color: "rgba(255,255,255,.5)", cursor: "pointer", fontSize: 13 }}>Annuler</button>
              <button onClick={() => onSave(form)} style={{ flex: 2, padding: 12, borderRadius: 10,
                border: "none", background: "linear-gradient(135deg,#3b82f6,#6366f1)",
                color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>Enregistrer</button>
            </div>
          </div>
        </div>
      );
    }

    /* ── App ──────────────────────────────────────────── */
    function App() {
      const [stocks,     setStocks]     = useState(INITIAL_STOCKS);
      const [modal,      setModal]      = useState(null);
      const [filter,     setFilter]     = useState("ALL");
      const [search,     setSearch]     = useState("");
      const [sortKey,    setSortKey]    = useState("ticker");
      const [refreshKey, setRefreshKey] = useState(0);
      const [livePrices, setLivePrices] = useState(null);  // null = loading, {} = done
      const [priceStatus, setPriceStatus] = useState("loading"); // "loading"|"live"|"unavailable"
      const [lastUpdated, setLastUpdated] = useState(null);

      // Fetch all prices on mount and on manual refresh
      useEffect(() => {
        setPriceStatus("loading");
        setLivePrices(null);
        const tickers = stocks.map(s => s.ticker);
        fetchAllPrices(tickers).then(prices => {
          if (prices && Object.keys(prices).length > 0) {
            setLivePrices(prices);
            setPriceStatus("live");
          } else {
            setLivePrices({});  // empty — will show N/A for all
            setPriceStatus("unavailable");
          }
          setLastUpdated(new Date());
        });
      }, [refreshKey]);

      const filtered = stocks
        .filter(s => filter === "ALL" || s.region === filter)
        .filter(s => s.ticker.toLowerCase().includes(search.toLowerCase()) || s.name.toLowerCase().includes(search.toLowerCase()))
        .sort((a, b) => {
          if (sortKey === "ticker")    return a.ticker.localeCompare(b.ticker);
          if (sortKey === "caGrowth") return b.caGrowth - a.caGrowth;
          if (sortKey === "per")      return a.per - b.per;
          if (sortKey === "roce")     return b.roce - a.roce;
          return 0;
        });

      const handleSave = form => {
        if (form.id) setStocks(s => s.map(x => x.id === form.id ? form : x));
        else         setStocks(s => [...s, { ...form, id: Date.now() }]);
        setModal(null);
      };

      const euCount = stocks.filter(s => s.region === "EU").length;
      const usCount = stocks.filter(s => s.region === "US").length;

      return (
        <div style={{ minHeight: "100vh", background: "#070d1a",
          backgroundImage: "radial-gradient(ellipse 80% 50% at 50% -20%,rgba(59,130,246,.12) 0%,transparent 60%)",
          paddingBottom: 60 }}>

          {/* ── Header ── */}
          <div style={{ borderBottom: "1px solid rgba(255,255,255,.06)",
            padding: "18px 24px", display: "flex", alignItems: "center",
            justifyContent: "space-between", flexWrap: "wrap", gap: 12,
            backdropFilter: "blur(12px)", background: "rgba(7,13,26,.85)",
            position: "sticky", top: 0, zIndex: 100 }}>

            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, fontSize: 18,
                background: "linear-gradient(135deg,#3b82f6,#6366f1)",
                display: "flex", alignItems: "center", justifyContent: "center" }}>📈</div>
              <div>
                <div style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 16, letterSpacing: -.5 }}>Club Bourseko</div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,.35)", letterSpacing: 2 }}>WATCHLIST · MARS 2026</div>
              </div>
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6,
                background: "rgba(255,255,255,.04)", border: "1px solid rgba(255,255,255,.08)",
                borderRadius: 10, padding: "7px 12px" }}>
                <span style={{ fontSize: 11, color: "rgba(255,255,255,.3)" }}>🔍</span>
                <input value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Rechercher..."
                  style={{ background: "none", border: "none", color: "#fff", fontSize: 12, outline: "none", width: 130 }} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
                <button onClick={() => setRefreshKey(k => k+1)} style={{
                  background: priceStatus==="live" ? "rgba(16,185,129,.15)" : priceStatus==="unavailable" ? "rgba(239,68,68,.12)" : "rgba(255,255,255,.06)",
                  border: `1px solid ${priceStatus==="live" ? "rgba(16,185,129,.4)" : priceStatus==="unavailable" ? "rgba(239,68,68,.3)" : "rgba(255,255,255,.1)"}`,
                  color: priceStatus==="live" ? "#6ee7b7" : priceStatus==="unavailable" ? "#f87171" : "rgba(255,255,255,.6)",
                  padding: "8px 14px", borderRadius: 10, cursor: "pointer", fontSize: 11, letterSpacing: 1,
                  display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ display: "inline-block", animation: priceStatus==="loading" ? "spin 1s linear infinite" : "none" }}>⟳</span>
                  {priceStatus==="loading" ? "Chargement..." : priceStatus==="live" ? "Cours en direct" : "Cours indisponibles"}
                </button>
                {lastUpdated && <span style={{ fontSize: 9, color: "rgba(255,255,255,.25)" }}>
                  Mis à jour {lastUpdated.toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"})}
                </span>}
              </div>
              <button onClick={() => setModal("add")} style={{
                background: "linear-gradient(135deg,#3b82f6,#6366f1)", border: "none",
                color: "#fff", padding: "9px 16px", borderRadius: 10,
                cursor: "pointer", fontSize: 12, fontWeight: 700, letterSpacing: .5 }}>+ Ajouter</button>
            </div>
          </div>

          {/* ── Filters & Sort ── */}
          <div style={{ padding: "16px 24px", display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            {[["ALL",`Tous (${stocks.length})`],["EU",`🇪🇺 Europe (${euCount})`],["US",`🇺🇸 États-Unis (${usCount})`]].map(([f,l]) => (
              <button key={f} onClick={() => setFilter(f)} style={{
                background: filter===f ? "rgba(99,102,241,.25)" : "rgba(255,255,255,.04)",
                border: `1px solid ${filter===f ? "rgba(99,102,241,.5)" : "rgba(255,255,255,.08)"}`,
                color: filter===f ? "#a5b4fc" : "rgba(255,255,255,.45)",
                padding: "7px 14px", borderRadius: 8, cursor: "pointer", fontSize: 11,
                fontWeight: 600, letterSpacing: 1 }}>{l}</button>
            ))}
            <div style={{ marginLeft: "auto", display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              <span style={{ fontSize: 10, color: "rgba(255,255,255,.3)", letterSpacing: 1 }}>TRIER PAR</span>
              {[["ticker","Ticker"],["caGrowth","CA+"],["per","PER"],["roce","ROCE"]].map(([k,l]) => (
                <button key={k} onClick={() => setSortKey(k)} style={{
                  background: sortKey===k ? "rgba(255,255,255,.1)" : "transparent",
                  border: "1px solid rgba(255,255,255,.08)",
                  color: sortKey===k ? "#fff" : "rgba(255,255,255,.4)",
                  padding: "5px 10px", borderRadius: 6, cursor: "pointer", fontSize: 10, letterSpacing: .5 }}>{l}</button>
              ))}
            </div>
          </div>

          {/* ── Legend ── */}
          <div style={{ padding: "0 24px 16px", display: "flex", gap: 14, flexWrap: "wrap", alignItems: "center" }}>
            {[["#6ee7b7","Zone E1 — Meilleur prix"],["#fbbf24","Zone E2"],["#f97316","Zone E3"],["#94a3b8","Au-dessus E3"]].map(([c,l]) => (
              <div key={l} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: c }} />
                <span style={{ fontSize: 10, color: "rgba(255,255,255,.4)" }}>{l}</span>
              </div>
            ))}
            <span style={{ fontSize: 10, color: "rgba(255,255,255,.18)", marginLeft: 4 }}>
            {priceStatus === "live" ? "· Cours en direct — Yahoo Finance" : priceStatus === "unavailable" ? "· Cours indisponibles — vérifiez votre connexion" : "· Chargement des cours..."}
          </span>
          </div>

          {/* ── Grid ── */}
          <div style={{ padding: "0 24px",
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill,minmax(320px,1fr))",
            gap: 14 }}>
            {filtered.map((stock, i) => (
              <div key={`${stock.id}-${refreshKey}`} style={{ animationDelay: `${i*50}ms` }}>
                <StockCard stock={stock} onEdit={s => setModal(s)} onDelete={id => setStocks(s => s.filter(x => x.id !== id))} livePrices={livePrices} />
              </div>
            ))}
            {filtered.length === 0 && (
              <div style={{ gridColumn: "1/-1", textAlign: "center", padding: 60, color: "rgba(255,255,255,.2)" }}>
                Aucune action trouvée
              </div>
            )}
          </div>

          {/* ── Modal ── */}
          {modal && <Modal stock={modal==="add" ? null : modal} onSave={handleSave} onClose={() => setModal(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
